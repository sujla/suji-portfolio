<!doctype html>
<html lang="ko" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Suji Kweon</title>
    <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Host+Grotesk:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-mark" aria-label="Suji Kweon's Portfolio Site">
      <img class="site-mark-image site-mark-image-dark" src="./assets/site-mark-dark.svg" alt="" aria-hidden="true" />
      <img class="site-mark-image site-mark-image-light" src="./assets/site-mark-light.svg" alt="" aria-hidden="true" />
    </header>

    <button class="theme-toggle" type="button" aria-label="Toggle dark and light mode" aria-pressed="false">
      <span class="theme-icon theme-icon-sun" aria-hidden="true">
        <img class="theme-icon-image theme-icon-image-dark" src="./assets/theme-toggle-sun-dark.svg" alt="" />
        <img class="theme-icon-image theme-icon-image-light" src="./assets/theme-toggle-sun-light.svg" alt="" />
      </span>
      <span class="theme-icon theme-icon-moon" aria-hidden="true">
        <img class="theme-icon-image theme-icon-image-dark" src="./assets/theme-toggle-moon-dark.svg" alt="" />
        <img class="theme-icon-image theme-icon-image-light" src="./assets/theme-toggle-moon-light.svg" alt="" />
      </span>
    </button>

    <nav class="year-rail" aria-label="Project years" data-year-rail></nav>

    <aside class="fixed-project-meta" aria-label="Focused project">
      <p data-side-number>01</p>
      <h4 data-side-title>Store Guide<br />UX/UI Renewal</h4>
    </aside>

    <aside class="project-counter" aria-label="Project progress">
      <span data-current-project>01</span>
      <span class="counter-line"></span>
      <span data-total-projects>06</span>
    </aside>

    <main class="portfolio-shell" data-project-list></main>

    <script type="module" src="./script.js?v=hashless"></script>
  </body>
</html>
